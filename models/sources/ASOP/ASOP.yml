version: 2

models:
  - name: ASOP_T
    description: Source data product — asset operation requests (activations, disposals, transfers).
    columns:
      - name: request_id
        tests: [not_null]
      - name: request_number
        tests: [not_null]
      - name: operation_type
        tests: [not_null]
      - name: business_ts
        tests: [not_null]
      - name: technical_ts
        tests: [not_null]

  - name: ASOP_t1_T
    description: T-1 output port for ASOP.
    columns:
      - name: request_number
        tests: [not_null, unique]

  - name: ASOP_m1_T
    description: M-1 output port for ASOP.
    columns:
      - name: request_number
        tests: [not_null, unique]

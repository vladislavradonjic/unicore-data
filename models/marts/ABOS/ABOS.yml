version: 2

models:
  - name: ABOS_T
    description: >
      Asset base (Baza OS) — all assets enriched with current assignment,
      category reference data, location and cost centre names. Built from
      t-1 output ports; one row per asset.
    columns:
      - name: asset_id
        tests: [not_null, unique]
      - name: asset_number
        tests: [not_null]
      - name: lifecycle_status
        tests: [not_null]
      - name: business_ts
        tests: [not_null]
      - name: technical_ts
        tests: [not_null]

  - name: ABOS_t1_T
    description: T-1 output port for ABOS. Consumer-facing interface.
    columns:
      - name: asset_id
        tests: [not_null, unique]
